<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400;1,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Covered+By+Your+Grace&display=swap" rel="stylesheet">
  <style>
    /* ─────────────────────────────────────────
       VARIABLES & RESET
    ───────────────────────────────────────── */
    :root {
      --ease: cubic-bezier(0.23, 1, 0.32, 1);
      --radius: 20px;
      --bg:           #f2efe9;
      --text:         #1c1916;
      --text-muted:   #8a8278;
      --border:       rgba(0,0,0,0.07);
      --glass-bg:     rgba(245,242,236,0.6);
      --glass-border: rgba(255,255,255,0.55);
      --tag-bg:       rgba(0,0,0,0.07);
      --tag-color:    #5a5248;
      --toggle-track: #e0dbd2;
      --toggle-thumb: #8a7a68;
      --shadow-sm:    0 1px 4px rgba(0,0,0,0.05), 0 4px 18px rgba(0,0,0,0.06);
      --shadow-lg:    0 8px 40px rgba(0,0,0,0.15);
    }

    [data-theme="dark"] {
      --bg:           #201c13;
      --text:         #ece8e0;
      --text-muted:   #7a7570;
      --border:       rgba(255,255,255,0.06);
      --glass-bg:     rgba(15,14,11,0.65);
      --glass-border: rgba(255,255,255,0.11);
      --tag-bg:       rgba(255,255,255,0.08);
      --tag-color:    #b0a898;
      --toggle-track: #28251e;
      --toggle-thumb: #c4ad8a;
      --shadow-sm:    0 1px 4px rgba(0,0,0,0.3), 0 4px 24px rgba(0,0,0,0.28);
      --shadow-lg:    0 8px 50px rgba(0,0,0,0.55);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { overflow-x: hidden; }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.4s var(--ease), color 0.4s var(--ease);
    }

 .texture {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background-image: url('bg-dot.png');
  background-repeat: repeat;
  background-size: 25px 25px;
  opacity: 0.1;
  transition: filter 0.45s var(--ease);
}

[data-theme="dark"] .texture {
  filter: invert(1);
  opacity: 0.15;
}
    /* ─────────────────────────────────────────
       HEADER
    ───────────────────────────────────────── */
    header {
    margin: 0 auto;
    padding: 2.8rem 2rem 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    }

    .site-title {
      font-family: "Covered By Your Grace", cursive;
      font-weight: 300;
      font-size: clamp(1.5rem, 4vw, 2rem);
      letter-spacing: 0.01em;
      color: var(--text);
    }

    .site-title span {
      color: var(--muted);
      font-style: italic;
    }

    /* toggle dark/light */
    .theme-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0.3rem 0.7rem;
      cursor: pointer;
      font-size: 13px;
      color: var(--muted);
      font-family: inherit;
      transition: color 0.2s, border-color 0.2s;
    }
    .theme-btn:hover { color: var(--text); border-color: rgba(0,0,0,0.2); }
    [data-theme="dark"] .theme-btn:hover { border-color: rgba(255,255,255,0.2); }

    /* ─────────────────────────────────────────
       FILTRES
    ───────────────────────────────────────── */
    .filters-wrap {
      margin: 2rem auto 0;
      padding: 0 2rem;
    }

    .filters {
      display: flex;
      gap: 0.45rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0.28rem 0.85rem;
      font-family: inherit;
      font-size: 10px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s var(--ease);
    }
    .filter-btn:hover { color: var(--text); border-color: rgba(0,0,0,0.2); }
    .filter-btn.active { color: var(--text); border-color: var(--text); }
    [data-theme="dark"] .filter-btn:hover,
    [data-theme="dark"] .filter-btn.active { border-color: rgba(255,255,255,0.35); }

    /* ─────────────────────────────────────────
       GRILLE
    ───────────────────────────────────────── */
.grid {
  column-width: 260px;
  column-gap: 3.2rem;
  margin: 2.6rem auto 5rem;
  padding: 0 2.5rem;
  max-width: auto;
}
    /* ─────────────────────────────────────────
       CARTE (FLIP)
    ───────────────────────────────────────── */
.card-wrap {
  position: relative;
  border-radius: 20px;
  break-inside: avoid;
  margin-bottom: 3rem;
  perspective: 900px;
  cursor: pointer;
  width: 100%;
  max-width: 320px;
  transition: transform 0.25s var(--ease);
}

/* .card-wrap {
  position: relative;
  z-index: 1;
}

.card-wrap:hover {
  z-index: 10;
} */

   /*  .card-inner {
      position: relative;
      width: 100%;
      transform-style: preserve-3d;
      transition: transform 0.55s var(--ease);
    } */

   .card-inner {
  position: relative;
  width: 100%;
  position: relative;
  overflow: hidden;          /* ← déplacé ici */
  border-radius: var(--r);   /* ← idem, pour que le clip suive l'arrondi */
}

    /* légères inclinaisons au repos
    .card-wrap:nth-child(4n+1) .card-inner { transform: rotate(-1.8deg); }
    .card-wrap:nth-child(4n+2) .card-inner { transform: rotate(1.2deg);  }
    .card-wrap:nth-child(4n+3) .card-inner { transform: rotate(-0.6deg); }
    .card-wrap:nth-child(4n+4) .card-inner { transform: rotate(1.5deg);  }*/

   /* .card-wrap:hover .card-inner,
    .card-wrap.flipped .card-inner {
      transform: rotate(0deg) rotateY(180deg) !important;
    } */

    .face {
      width: 100%;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: var(--r);
      background: var(--card-bg);
      box-shadow: var(--shadow);
      transition: box-shadow 0.3s var(--ease), border-color 0.4s var(--ease), background 0.4s var(--ease);
    }
    .card-wrap:hover .face { box-shadow: var(--shadow-h); }

    /* ── Recto ── */
    .face-front {
      display: flex;
      flex-direction: column;
    }

   .ticket-img {
  width: 100%;
  height: auto;
  border-radius: var(--r) var(--r) 0 0;
  display: block;
  max-height: 520px;
  object-fit: contain;
}

    .ticket-img-placeholder {
  width: 100%;
  height: 200px;
  border-radius: var(--r) var(--r) 0 0;
}

    .ticket-stub {
      padding: 0.65rem 0.8rem 0.8rem;
      border-top: 1px dashed var(--border);
    }

    .ticket-title {
      font-size: 11px;
      font-weight: 400;
      color: var(--text);
      line-height: 1.35;
    }

    .ticket-meta {
      font-size: 10px;
      color: var(--muted);
      margin-top: 2px;
      letter-spacing: 0.02em;
    }

    /* ── Verso ── */
    .face-back {
  position: absolute;
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  min-height: 100%;
  overflow: hidden; 
  display: flex;
  flex-direction: column;
  padding: 1rem 0.9rem;
  background-color: #ece8e0;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s var(--ease);
  border-radius: 20px;
  z-index: 2;
}

.card-wrap:hover .face-back {
  opacity: 1;
  pointer-events: auto;
}

.face-back::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: var(--r);
  pointer-events: none;
  border: 1px dashed #8a7a68;
  opacity: 0;
  transform: scale(0.96);
  transition:
    opacity 0.25s ease,
    transform 0.35s var(--ease);
}

.card-wrap:hover .face-back::before {
  opacity: 1;
  transform: scale(1);
}

.face-front {
  transition: opacity 0.25s var(--ease);
}

.card-wrap:hover .face-front {
  opacity: 0.08;
}

    .back-date {
      font-size: 12px;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.6rem;
    }

    .back-note {
      font-family: "Covered By Your Grace", cursive;
      font-weight: 10;
      font-size: 19px;
      line-height: 1.6;
      color: var(--text);
      flex: 1;
    }

    .back-tag {
      margin-top: 0.75rem;
      padding-top: 0.55rem;
      border-top: 1px solid var(--border);
      font-size: 9px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--muted);
    }

  [data-theme="dark"] .face-back, .back-date, .back-note, .back-tag { color: #1c1916; }

    /* ── Message vide ── */
   .empty-msg {
  display: block;
  width: 100%;
  max-width: 600px;
  margin: 2rem auto;
  text-align: center;
}

/* ─────────────────────────────────────────
       FOOTER
    ───────────────────────────────────────── */
.patch-img {
  max-width: 350px;
  margin: 0 auto; /* centre horizontalement en tant que bloc */
  text-align: center;
  padding-bottom: 2rem; /* espace avec le bas de la page si nécessaire */
  padding-top: 2rem;
  display: block;
  filter: drop-shadow(-3px 6px 5px #21212130);
}

[data-theme="dark"] .patch-img {

.footerlink {

  display: flex;

}

.footerlink a {

  font-family: inherit;
  font-size: 10px;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.2s var(--ease);
  text-align: center;
  display: inline-block; /* ← était "block", ce qui cassait tout */
  background-color: #e0dbd240;
  text-decoration: none;
}

.footerlink span {
  color: var(--text-muted);
  font-size: 0.93rem;
  font-weight: 300;
}

.footerlink a:hover { color: #8a7a68; border-color: rgba(0,0,0,0.2); }
[data-theme="dark"] .footerlink a:hover {color: #ece8e0; border-color: rgba(255,255,255,0.35); }
[data-theme="dark"] .footerlink a { color: #c4ad8a; border-color: #c4ad8a;}

@view-transition {navigation: auto;
}

    /* ═══════════════════════════════════════════════════════════ */


    /* ── Filtres par année (générés automatiquement) ── */
const filtersEl = document.getElementById('filters');
const gridEl    = document.getElementById('grid');

const years = [...new Set(TICKETS.map(t => t.year))].sort((a, b) => b - a);
years.forEach(y => {
  const btn = document.createElement('button');
  btn.className    = 'filter-btn';
  btn.dataset.year = y;
  btn.textContent  = y;
  filtersEl.appendChild(btn);
});

filtersEl.addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  filtersEl.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
});

/* ── Construction d'une carte ── */
function buildCard(t) {
  const wrap = document.createElement('div');
  wrap.className    = 'card-wrap';
  wrap.dataset.year = t.year;

  const imgHTML = t.img
    ? `<img class="ticket-img" src="${t.img}" alt="${t.title}" loading="lazy">`
    : `<div class="ticket-img-placeholder" style="background:${t.color};"></div>`;

  wrap.innerHTML = `
    <div class="card-inner">
      <div class="face face-front">
        ${imgHTML}
        <div class="ticket-stub">
          <div class="ticket-title">${t.title}</div>
          <div class="ticket-meta">${t.meta}</div>
        </div>
      </div>
      <div class="face face-back">
        <div class="back-date">${t.date}</div>
        <div class="back-note">${t.note}</div>
        <div class="back-tag">${t.tag}</div>
      </div>
    </div>`;

  const img = wrap.querySelector('img');
  if (img) img.addEventListener('load', syncBackHeights);

  return wrap;
}

/* ── Tri par date (français → Date JS) ── */
const MOIS = {
  janvier: 0, février: 1, mars: 2, avril: 3,
  mai: 4, juin: 5, juillet: 6, août: 7,
  septembre: 8, octobre: 9, novembre: 10, décembre: 11
};

function parseDate(str) {
  const parts = str.trim().split(' ');
  if (parts.length === 3) {
    const [jour, mois, annee] = parts;
    return new Date(+annee, MOIS[mois] ?? 0, +jour);
  }
  if (parts.length === 2) {
    const [mois, annee] = parts;
    return new Date(+annee, MOIS[mois] ?? 0, 1);
  }
  return new Date(0);
}

/* ── Thème système au chargement ── */
if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
  document.documentElement.dataset.theme = 'dark';
  document.getElementById('theme-btn').textContent = '🌞';
} else {
  document.getElementById('theme-btn').textContent = '🌛';
}

/* ── Rendu de la grille ── */
let cards = [];

function render() {
  cards.forEach(c => c.remove());
  cards = [];

  const activeYear = filtersEl.querySelector('.filter-btn.active').dataset.year;
  const visible = (activeYear === 'all'
    ? TICKETS
    : TICKETS.filter(t => t.year === activeYear))
    .slice()
    .sort((a, b) => parseDate(b.date) - parseDate(a.date));

  if (visible.length === 0) {
    const msg = document.createElement('p');
    msg.className   = 'empty-msg';
    msg.textContent = 'Aucun souvenir pour cette période.';
    gridEl.appendChild(msg);
    cards.push(msg);
  } else {
    visible.forEach(t => {
      const card = buildCard(t);
      gridEl.appendChild(card);
      cards.push(card);
    });
  }

  syncBackHeights();
}

    /* aligne la hauteur du verso sur celle du recto */
    function syncBackHeights() {
      requestAnimationFrame(() => {
        document.querySelectorAll('.card-wrap').forEach(wrap => {
          const front = wrap.querySelector('.face-front');
          const back  = wrap.querySelector('.face-back');
          if (front && back) back.style.height = front.offsetHeight + 'px';
        });
      });
    }
    window.addEventListener('resize', syncBackHeights);

    /* ── Toggle dark / light ── */
    const themeBtn = document.getElementById('theme-btn');
    themeBtn.addEventListener('click', () => {
      const isDark = document.documentElement.dataset.theme === 'dark';
      document.documentElement.dataset.theme = isDark ? 'light' : 'dark';
      themeBtn.textContent = isDark ? '🌛' : '🌞';
    });

    render(); /* ← ajouter cette ligne */

  </script>
